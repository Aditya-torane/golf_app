<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Golf Charity Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-white text-slate-900 min-h-screen">
  <header class="border-b border-slate-200 bg-white sticky top-0 z-20">
    <nav class="navbar navbar-expand-lg navbar-light px-0">
      <div class="max-w-7xl mx-auto px-4 py-3">
        <a class="navbar-brand text-2xl font-bold" href="#">Admin Panel</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarAdmin" aria-controls="navbarAdmin" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarAdmin">
          <div class="ms-auto d-flex gap-2 flex-wrap">
            <button id="adminLogoutBtn" class="btn-danger nav-link px-3">Logout</button>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <main class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">

    <section class="dashboard-card">
      <h2 class="text-lg font-semibold mb-3">Analytics</h2>
      <div class="text-slate-600">Total Users: <span id="adminTotalUsers" class="text-slate-900 font-semibold">-</span></div>
      <div class="text-slate-600">Active Subscriptions: <span id="adminActiveSubscriptions" class="text-slate-900 font-semibold">-</span></div>
      <div class="text-slate-600">Revenue (Simulated): <span id="adminRevenue" class="text-slate-900 font-semibold">-</span></div>
    </section>

    <section class="dashboard-card">
      <h2 class="text-lg font-semibold mb-3">Search & Filter</h2>
      <div class="grid md:grid-cols-3 gap-2">
        <input id="adminUserEmailFilter" class="input-field" placeholder="Filter users by email">
        <input id="adminCharityNameFilter" class="input-field" placeholder="Filter charities by name">
        <input id="adminScoreEmailFilter" class="input-field" placeholder="Filter scores by user email">
      </div>
      <div class="mt-3">
        <button id="applyAdminFiltersBtn" class="btn-primary">Apply Filters</button>
      </div>
    </section>

    <section class="dashboard-card">
      <h2 class="text-lg font-semibold mb-3">Run Monthly Draw</h2>
      <button id="runDrawBtn" class="btn-primary">Run Draw</button>
      <p id="drawNumbers" class="mt-3 text-slate-300"></p>
    </section>

    <section class="dashboard-card">
      <h2 class="text-lg font-semibold mb-3">Manage Charities</h2>
      <form id="charityForm" class="grid md:grid-cols-4 gap-2 mb-4">
        <input id="charityName" class="input-field" placeholder="Charity name" required>
        <input id="charityDescription" class="input-field" placeholder="Description" required>
        <input id="charityPercent" class="input-field" type="number" min="10" max="100" placeholder="Donation %" required>
        <button class="btn-primary" type="submit">Add Charity</button>
      </form>
      <div id="charityAdminList" class="space-y-2"></div>
    </section>

    <section class="dashboard-card">
      <h2 class="text-lg font-semibold mb-3">All Users</h2>
      <div id="userList" class="space-y-2"></div>
    </section>

    <section class="dashboard-card">
      <h2 class="text-lg font-semibold mb-3">All Scores (Edit)</h2>
      <div id="allScoresList" class="space-y-2"></div>
    </section>

    <section class="dashboard-card">
      <h2 class="text-lg font-semibold mb-3">User Payments</h2>
      <div id="paymentsAdminList" class="space-y-2"></div>
    </section>
  </main>

  <div id="toastContainer" class="fixed top-5 right-5 z-50 space-y-3"></div>
  <div id="spinnerOverlay" class="spinner-overlay hidden">
    <div class="loader"></div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
