<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Golf Charity Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md glass-card device-frame">
    <h1 class="text-3xl font-bold gradient-text mb-2">Welcome Back</h1>
    <p class="text-slate-200 mb-6">Sign in to continue supporting charities with Golf Charity Platform</p>

    <form id="loginForm" class="space-y-4">
      <input class="input-field" type="email" id="email" placeholder="Email" required>
      <input class="input-field" type="password" id="password" placeholder="Password" required>
      <button class="btn-primary w-full" type="submit">Login</button>
    </form>

    <p class="text-slate-200 mt-4 text-sm">
      New user? <a class="text-cyan-300 hover:text-sky-200" href="signup.html">Signup here</a>
    </p>
  </div>

  <div id="toastContainer" class="fixed top-5 right-5 z-50 space-y-3"></div>
  <div id="spinnerOverlay" class="spinner-overlay hidden">
    <div class="loader"></div>
  </div>
    <br>
    <br>
    <br>
     <br>
      <br>
       <br>
        <br> 
         <br>
        <br>
        
        
  <footer class="fixed bottom-0 left-0 w-full bg-black/30 backdrop-blur border-t border-white/20 text-center py-3 text-xs text-white">
    <span>  &copy 2026  <B>Golf Charity Platform</B></span>
    <span class="mx-2">|</span>
    <a href="#" class="text-white hover:text-sky-200">Terms</a>
    <span class="mx-2">|</span>
    <a href="#" class="text-white hover:text-sky-200">Privacy</a>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
