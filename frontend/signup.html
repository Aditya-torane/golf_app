<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup | Golf Charity Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md glass-card device-frame">
    <h1 class="text-3xl font-bold gradient-text mb-2">Join the Community</h1>
    <p class="text-slate-200 mb-6">Create your account and begin playing for charity today</p>

    <form id="signupForm" class="space-y-4">
      <input class="input-field" type="text" id="name" placeholder="Full Name" required>
      <input class="input-field" type="email" id="email" placeholder="Email" required>
      <input class="input-field" type="password" id="password" placeholder="Password" required>
      <select class="input-field" id="role">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>
      <button class="btn-primary w-full" type="submit">Signup</button>
    </form>

    <p class="text-slate-200 mt-4 text-sm">
      Already have an account? <a class="text-cyan-300 hover:text-sky-200" href="login.html">Login</a>
    </p>
  </div>

  <div id="toastContainer" class="fixed top-5 right-5 z-50 space-y-3"></div>
  <div id="spinnerOverlay" class="spinner-overlay hidden">
    <div class="loader"></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
